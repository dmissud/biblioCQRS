<div class="header-container">
  <h2>Catalogue des Ouvrages</h2>
  <button mat-mini-fab color="primary" (click)="refresh()" matTooltip="Actualiser">
    <mat-icon>refresh</mat-icon>
  </button>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  <ng-container matColumnDef="isbn">
    <th mat-header-cell *matHeaderCellDef> ISBN </th>
    <td mat-cell *matCellDef="let element"> {{element.isbn}} </td>
  </ng-container>

  <ng-container matColumnDef="titre">
    <th mat-header-cell *matHeaderCellDef> Titre </th>
    <td mat-cell *matCellDef="let element"> {{element.titre}} </td>
  </ng-container>

  <ng-container matColumnDef="auteur">
    <th mat-header-cell *matHeaderCellDef> Auteur </th>
    <td mat-cell *matCellDef="let element"> {{element.auteur}} </td>
  </ng-container>

  <ng-container matColumnDef="nombreExemplaires">
    <th mat-header-cell *matHeaderCellDef> Exemplaires Dispo </th>
    <td mat-cell *matCellDef="let element">
      <span class="badge" [class.badge-empty]="element.nombreExemplaires === 0">
        {{element.nombreExemplaires}}
      </span>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
